repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        files: ^(\.cloudbuild/.*\.ya?ml|\.github/workflows/.*\.ya?ml|\.pre-commit-config\.yaml|backend/.*\.py|docker-compose(\.prod)?\.yml|website/.*\.(css|cjs|html|js|json|jsx))$
      - id: end-of-file-fixer
        files: ^(\.cloudbuild/.*\.ya?ml|\.github/workflows/.*\.ya?ml|\.pre-commit-config\.yaml|backend/.*\.py|docker-compose(\.prod)?\.yml|website/.*\.(css|cjs|html|js|json|jsx))$
      - id: check-yaml
        files: ^(\.cloudbuild/.*\.ya?ml|\.github/workflows/.*\.ya?ml|docker-compose(\.prod)?\.yml)$
      - id: check-json
        files: ^website/.*\.json$
      - id: check-toml
        files: ^backend/pyproject\.toml$
      - id: check-merge-conflict
        files: ^(\.cloudbuild/.*\.ya?ml|\.github/workflows/.*\.ya?ml|\.pre-commit-config\.yaml|backend/.*\.py|docker-compose(\.prod)?\.yml|website/.*\.(css|cjs|html|js|json|jsx))$
      - id: check-case-conflict
        files: ^(\.cloudbuild/.*\.ya?ml|\.github/workflows/.*\.ya?ml|\.pre-commit-config\.yaml|backend/.*\.py|docker-compose(\.prod)?\.yml|website/.*\.(css|cjs|html|js|json|jsx))$
      - id: check-added-large-files
        files: ^(\.cloudbuild/.*\.ya?ml|\.github/workflows/.*\.ya?ml|\.pre-commit-config\.yaml|backend/.*\.py|docker-compose(\.prod)?\.yml|website/.*\.(css|cjs|html|js|json|jsx))$
      - id: detect-private-key
        files: ^(\.cloudbuild/.*\.ya?ml|\.github/workflows/.*\.ya?ml|\.pre-commit-config\.yaml|backend/.*\.py|docker-compose(\.prod)?\.yml|website/.*\.(css|cjs|html|js|json|jsx))$

  - repo: local
    hooks:
      - id: backend-ruff-check
        name: Backend Ruff Check
        entry: bash -lc 'cd backend && uv run ruff check .'
        language: system
        pass_filenames: false
        files: ^backend/
      - id: backend-ruff-format-check
        name: Backend Ruff Format Check
        entry: bash -lc 'cd backend && uv run ruff format --check .'
        language: system
        pass_filenames: false
        files: ^backend/
