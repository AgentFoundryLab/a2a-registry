name: Deploy A2A Registry

on:
  push:
    branches:
      - main
      - "release/**"
    paths:
      - "backend/**"
      - "website/**"
      - ".cloudbuild/**"
      - "helm/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GKE_CLUSTER: clusterkit
  GKE_REGION: us-central1
  IMAGE_TAG: ${{ github.sha }}
  A2A_IMAGE_PLATFORM: linux/amd64
  A2A_FRONTEND_API_URL: ${{ vars.A2A_FRONTEND_API_URL }}
  A2A_FRONTEND_POSTHOG_HOST: ${{ vars.A2A_FRONTEND_POSTHOG_HOST || 'https://us.posthog.com' }}
  A2A_FRONTEND_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          working-directory: backend
      - run: uv sync --extra dev --frozen
      - run: uv run --extra dev pytest tests/ -v

  build-and-push:
    name: Build & Push via Cloud Build
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Submit Cloud Build
        run: |
          gcloud builds submit . \
            --project "${GCP_PROJECT_ID}" \
            --config ".cloudbuild/a2a-images.yaml" \
            --timeout "10m" \
            --substitutions "_A2A_API_IMAGE=gcr.io/${GCP_PROJECT_ID}/a2a-registry-api:${IMAGE_TAG},_A2A_WORKER_IMAGE=gcr.io/${GCP_PROJECT_ID}/a2a-registry-worker:${IMAGE_TAG},_A2A_FRONTEND_IMAGE=gcr.io/${GCP_PROJECT_ID}/a2a-registry-frontend:${IMAGE_TAG},_A2A_IMAGE_PLATFORM=${A2A_IMAGE_PLATFORM},_A2A_FRONTEND_API_URL=${A2A_FRONTEND_API_URL},_A2A_FRONTEND_POSTHOG_HOST=${A2A_FRONTEND_POSTHOG_HOST},_A2A_FRONTEND_POSTHOG_KEY=${A2A_FRONTEND_POSTHOG_KEY}"

      - name: Tag latest images
        run: |
          gcloud artifacts docker tags add "gcr.io/${GCP_PROJECT_ID}/a2a-registry-api:${IMAGE_TAG}" "gcr.io/${GCP_PROJECT_ID}/a2a-registry-api:latest" --quiet
          gcloud artifacts docker tags add "gcr.io/${GCP_PROJECT_ID}/a2a-registry-worker:${IMAGE_TAG}" "gcr.io/${GCP_PROJECT_ID}/a2a-registry-worker:latest" --quiet
          gcloud artifacts docker tags add "gcr.io/${GCP_PROJECT_ID}/a2a-registry-frontend:${IMAGE_TAG}" "gcr.io/${GCP_PROJECT_ID}/a2a-registry-frontend:latest" --quiet

