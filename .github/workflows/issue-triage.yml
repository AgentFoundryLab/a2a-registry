name: Claude Issue Triage

on:
  issues:
    types: [opened, edited, assigned, labeled]

jobs:
  triage-issue:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup GitHub MCP Server
        run: |
          mkdir -p /tmp/mcp-config
          cat > /tmp/mcp-config/mcp-servers.json << 'EOF'
          {
            "mcpServers": {
              "github": {
                "command": "docker",
                "args": [
                  "run",
                  "-i",
                  "--rm",
                  "-e",
                  "GITHUB_PERSONAL_ACCESS_TOKEN",
                  "ghcr.io/github/github-mcp-server:sha-efef8ae"
                ],
                "env": {
                  "GITHUB_PERSONAL_ACCESS_TOKEN": "${{ secrets.GITHUB_TOKEN }}"
                }
              }
            }
          }
          EOF

      - name: Create triage prompt
        id: triage-prompt
        run: |
          cat >> "$GITHUB_OUTPUT" << 'EOF'
          prompt<<PROMPT_END
          You're an issue triage assistant for GitHub issues. Your task is to analyze the issue and apply labels only.

          Important constraints:
          - Do not post comments.
          - Do not communicate with the user.
          - Only use repository labels that already exist.

          Issue context:
          - REPO: ${{ github.repository }}
          - ISSUE_NUMBER: ${{ github.event.issue.number }}

          Use GitHub MCP tools to inspect the issue, comments, similar issues, and existing repo labels.
          Apply the most accurate labels you can justify. If none are clearly applicable, do nothing.
          PROMPT_END
          EOF

      - name: Run Claude Code for Issue Triage
        uses: anthropics/claude-code-action@v1
        with:
          prompt: ${{ steps.triage-prompt.outputs.prompt }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --allowedTools "mcp__github__get_issue,mcp__github__get_issue_comments,mcp__github__update_issue,mcp__github__search_issues,mcp__github__list_issues"
            --mcp-config /tmp/mcp-config/mcp-servers.json
        env:
          GITHUB_PERSONAL_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
